<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>えこりん村 360度ツアー（地図連携版）</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="panorama"></div>

    <div id="map-container">
        <img id="map-image" src="image/map.webp" alt="Map">
        <div id="current-pos"></div>

        <div class="map-dot-button" style="top: 80%; left: 20%;" onclick="changeScene('entrance')"></div>
        <div class="map-dot-button" style="top: 50%; left: 40%;" onclick="changeScene('garden_path')"></div>
        <div class="map-dot-button" style="top: 30%; left: 70%;" onclick="changeScene('city_view')"></div>
        <div class="map-dot-button" style="top: 10%; left: 85%;" onclick="changeScene('sunset_road')"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
